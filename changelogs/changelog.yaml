ancestor: null
releases:
  0.1.0:
    changes:
      minor_changes:
      - ckan_dataset - manage datasets (packages) on a CKAN portal
      - ckan_dataset_info - fetch information about a dataset
      - ckan_dataset_search - search datasets with Solr query syntax
      - ckan_group - manage thematic groups on a CKAN portal
      - ckan_organization - manage organizations on a CKAN portal
      - ckan_organization_info - fetch information about an organization
      - ckan_organization_member - manage user membership and roles in an organization
      - ckan_status_info - fetch site status and CKAN version
      - ckan_user - manage users on a CKAN portal
      - ckan_user_info - fetch information about a user
      release_summary: 'Initial release of the msradam.ckan Ansible collection.

        Provides idempotent modules for managing CKAN open-data portal resources

        via the CKAN Action API. Validated against CKAN 2.11.5.

        '
    fragments:
    - v0.1.0-initial.yaml
    modules:
    - description: Manage CKAN datasets
      name: ckan_dataset
      namespace: ''
    - description: Retrieve information about a CKAN dataset
      name: ckan_dataset_info
      namespace: ''
    - description: Search datasets on a CKAN portal
      name: ckan_dataset_search
      namespace: ''
    - description: Manage CKAN groups
      name: ckan_group
      namespace: ''
    - description: Manage CKAN organizations
      name: ckan_organization
      namespace: ''
    - description: Retrieve information about a CKAN organization
      name: ckan_organization_info
      namespace: ''
    - description: Manage user membership in a CKAN organization
      name: ckan_organization_member
      namespace: ''
    - description: Retrieve status and version information from a CKAN portal
      name: ckan_status_info
      namespace: ''
    - description: Manage CKAN users
      name: ckan_user
      namespace: ''
    - description: Retrieve information about a CKAN user
      name: ckan_user_info
      namespace: ''
    release_date: '2026-06-22'
